<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimalist, high-contrast, universally adaptable background (almost black) -->
  <rect width="256" height="256" rx="56" fill="#111111" />
  
  <!-- Back wave (subtle) -->
  <path d="M40 110 C 80 50, 120 170, 180 80" stroke="rgba(255,255,255,0.2)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Middle wave -->
  <path d="M60 150 C 100 90, 140 210, 200 120" stroke="rgba(255,255,255,0.5)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Front wave (solid white) -->
  <path d="M80 190 C 120 130, 160 250, 220 160" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
</svg>